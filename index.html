    <title>フリーランス源泉徴収・手取り計算ツール【インボイス対応】 | フリカル</title>
    <meta name="description" content="フリーランス専用の源泉徴収・消費税・手取りを一瞬で計算。インボイス対応の請求書PDFも作成可能。">

    <!-- JSON-LD (SEO) -->

      "@context": "https://schema.org",

    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1d4ed8; --primary-light: #eff6ff;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg-body: #f9fafb; --bg-card: #ffffff; --text-main: #111827;
            --text-muted: #4b5563; --border-main: #e5e7eb;
        }
        [data-theme="dark"] {
            --bg-body: #0f172a; --bg-card: #1e293b; --text-main: #f8fafc;
            --text-muted: #cbd5e1; --border-main: #334155; --primary-light: rgba(37, 99, 235, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg-body); color: var(--text-main); line-height: 1.6; transition: 0.3s; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        header { background: var(--bg-card); border-bottom: 1px solid var(--border-main); padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto; padding: 0 20px; }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary); text-decoration: none; }

        .card { background: var(--bg-card); border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border-main); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        /* 共通ボタン・入力 */
        .btn-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-pri { background: var(--primary); color: white; }
        .btn-sec { background: var(--primary-light); color: var(--primary); }
        .btn-success { background: var(--success); color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-main); background: var(--bg-card); color: var(--text-main); font-size: 16px; }
        .main-input-wrap { position: relative; margin-bottom: 20px; }
        .main-input-wrap span { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-weight: bold; color: var(--text-muted); }
        #main-input { padding-left: 35px; font-size: 32px; font-weight: 900; }

        /* 広告枠 */
        .ad-space { background: var(--primary-light); border: 1px dashed var(--primary); border-radius: 8px; padding: 10px; text-align: center; margin: 20px 0; min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
        .ad-label { font-size: 10px; color: var(--text-muted); margin-bottom: 5px; }

        /* 結果表示 */
        .res-card { background: var(--primary-light); border: 2px solid var(--primary); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .res-total { font-size: 36px; font-weight: 900; color: var(--primary); }
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; text-align: left; }
        .res-item label { font-size: 12px; color: var(--text-muted); }
        .res-item div { font-weight: 700; font-size: 18px; }

        .formula { background: #f1f5f9; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; white-space: pre-wrap; margin-bottom: 20px; color: #475569; }
        [data-theme="dark"] .formula { background: #0f172a; color: #cbd5e1; }

        /* FAQ */
        .faq-item { border: 1px solid var(--border-main); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
        .faq-q { width: 100%; padding: 15px; text-align: left; background: var(--bg-card); border: none; font-weight: bold; display: flex; justify-content: space-between; color: var(--text-main); }
        .faq-a { padding: 0 15px; max-height: 0; overflow: hidden; transition: 0.3s; font-size: 14px; color: var(--text-muted); }
        .faq-item.open .faq-a { padding: 15px; max-height: 200px; }

        /* モーダル */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.open { display: flex; }
        .modal-content { background: var(--bg-card); padding: 24px; border-radius: 12px; max-width: 500px; width: 90%; }

        @media (max-width: 600px) {
            .res-grid { grid-template-columns: 1fr; }
            #main-input { font-size: 24px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-flex">
        <a href="/" class="logo">フリカル</a>
        <button id="theme-toggle" aria-label="テーマ切り替え" style="background:none; font-size:20px;">🌙</button>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2>💰 報酬計算</h2>
        <div class="btn-group" role="tablist">
            <button class="btn-pri" id="tab-net" onclick="UI.setMode('net')">手取りから</button>
            <button class="btn-sec" id="tab-ex" onclick="UI.setMode('ex')">税抜から</button>
            <button class="btn-sec" id="tab-in" onclick="UI.setMode('in')">税込から</button>
        </div>

        <div class="main-input-wrap">
            <span>¥</span>
            <input id="main-input" type="text" inputmode="numeric" placeholder="0" aria-label="金額入力">
        </div>

        <div class="btn-group">
            <button class="btn-sec" onclick="UI.preset(50000)">5万</button>
            <button class="btn-sec" onclick="UI.preset(100000)">10万</button>
            <button class="btn-sec" onclick="UI.preset(300000)">30万</button>
            <button class="btn-sec" onclick="UI.preset(500000)">50万</button>
        </div>

        <div class="res-grid" style="margin-bottom: 20px;">
            <div>
                <label>消費税率</label>
                <select id="tax-rate">
                    <option value="0.1">10% (標準)</option>
                    <option value="0.08">8% (軽減)</option>
                    <option value="0">0% (非課税)</option>
                </select>
            </div>
            <div>
                <label>端数処理</label>
                <select id="tax-round">
                    <option value="floor">切捨て</option>
                    <option value="round">四捨五入</option>
                    <option value="ceil">切上げ</option>
                </select>
            </div>
        </div>

        <label style="display:flex; align-items:center; gap:8px; font-weight:bold; margin-bottom:10px;">
            <input type="checkbox" id="wh-check" checked style="width:auto;"> 源泉徴収を行う
        </label>

        <div id="wh-config">
            <label style="font-size:12px; color:var(--text-muted);">報酬区分</label>
            <select id="wh-cat">
                <option value="1">第1号 (原稿・デザイン・講演等)</option>
                <option value="2">第2号 (弁護士・税理士等) ※1万円控除</option>
                <option value="5">第5号 (広告宣伝・出演等) ※5万円控除</option>
            </select>
        </div>
    </div>

    <div class="res-card">
        <label style="font-size:12px; font-weight:bold;">請求金額 (税込)</label>
        <div class="res-total" id="out-total">¥0</div>
        <div class="res-grid">
            <div class="res-item"><label>税抜報酬</label><div id="out-ex">¥0</div></div>
            <div class="res-item"><label>消費税</label><div id="out-tax">¥0</div></div>
            <div class="res-item"><label>源泉徴収</label><div id="out-wh" style="color:var(--danger);">¥0</div></div>
            <div class="res-item"><label>手取り額</label><div id="out-net" style="color:var(--success);">¥0</div></div>
        </div>
    </div>

    <div class="formula" id="out-formula"></div>

    <div class="btn-group">
        <button class="btn-success" onclick="Tracker.save()">💾 履歴に保存</button>
        <button class="btn-sec" onclick="UI.copyResult()">📋 結果をコピー</button>
    </div>

    <!-- 広告枠1 -->
    <div class="ad-space">
        <span class="ad-label">スポンサーリンク</span>
        <script data-cfasync="false" src="https://adm.shinobi.jp/s/6baec358617c7f0f67d4cd1d34d3fab8"></script>
    </div>

    <div class="card">
        <h2>📄 インボイス対応PDF作成</h2>
        <div class="res-grid">
            <input id="pdf-client" type="text" placeholder="顧客名 (必須)" aria-required="true">
            <input id="pdf-number" type="text" placeholder="登録番号 T123..." maxlength="14">
        </div>
        <textarea id="pdf-note" placeholder="備考・振込先など" style="margin-top:10px; height:80px;"></textarea>
        <button class="btn-pri" id="btn-pdf" onclick="PDF.generate()" style="width:100%; margin-top:15px;" disabled>PDFを出力 (日本語対応)</button>
    </div>

    <!-- 広告枠2 -->
    <div class="ad-space">
        <span class="ad-label">スポンサーリンク</span>
        <script data-cfasync="false" src="https://adm.shinobi.jp/s/9ab754809559f2389dc09b667b1854ed"></script>
    </div>

    <div class="card">
        <h2>📝 売上履歴</h2>
        <div id="history-list" style="max-height:300px; overflow-y:auto; font-size:14px;"></div>
        <button class="btn-sec" onclick="Tracker.clear()" style="width:100%; margin-top:10px;">履歴を全削除</button>
    </div>

    <div class="card">
        <h2>❓ よくある質問</h2>
        <div class="faq-item">
            <button class="faq-q" onclick="UI.toggleFaq(this)">源泉徴収の100万円超の計算は？<span>▼</span></button>
            <div class="faq-a">本ツールは、100万円を超える部分に対して自動的に20.42%の税率を適用して計算します。</div>
        </div>
        <div class="faq-item">
            <button class="faq-q" onclick="UI.toggleFaq(this)">データは保存されますか？<span>▼</span></button>
            <div class="faq-a">入力したデータはお使いのブラウザ内(IndexedDB)にのみ保存されます。サーバーには送信されません。</div>
        </div>
    </div>
</div>

<footer style="text-align:center; padding:40px 0; color:var(--text-muted); font-size:12px;">
    &copy; 2026 フリカル | <a href="#" onclick="UI.openModal('modal-terms')">利用規約</a>
</footer>

<!-- モーダル -->
<div id="modal-terms" class="modal" onclick="UI.closeModal('modal-terms')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>利用規約</h3>
        <p style="font-size:14px; margin:15px 0;">本ツールの計算結果は目安です。実際の申告は税理士等にご相談ください。</p>
        <button class="btn-pri" onclick="UI.closeModal('modal-terms')">閉じる</button>
    </div>
</div>

<script>
"use strict";

const AppState = {
    mode: 'net',
    val: 0,
    taxRate: 0.1,
    round: 'floor',
    isWh: true,
    whCat: '1',
    results: {}
};

// --- 計算ロジック ---
const Calc = {
    execute() {
        let ex = 0;
        const v = AppState.val;
        const r = AppState.taxRate;
        const isWh = AppState.isWh;
        
        // 控除額設定
        const deduct = AppState.whCat === '2' ? 10000 : (AppState.whCat === '5' ? 50000 : 0);

        if (AppState.mode === 'ex') {
            ex = v;
        } else if (AppState.mode === 'in') {
            ex = v / (1 + r);
        } else {
            // 手取り逆算 (複雑なため近似計算後に補正)
            if (!isWh) {
                ex = v / (1 + r);
            } else {
                // 100万円以下のケースで仮計算
                ex = (v - (deduct * 0.1021)) / (1 + r - 0.1021);
                // 100万円超える場合の再計算
                if (ex > 1000000) {
                    ex = (v - 102100 + 204200 - (deduct * 0.2042)) / (1 + r - 0.2042);
                }
            }
        }

        ex = Math.round(ex);
        const tax = this.applyRound(ex * r);
        let wh = 0;
        if (isWh) {
            const target = Math.max(0, ex - deduct);
            if (target <= 1000000) {
                wh = Math.floor(target * 0.1021);
            } else {
                wh = Math.floor((target - 1000000) * 0.2042 + 102100);
            }
        }

        AppState.results = {
            ex, tax, wh,
            total: ex + tax,
            net: ex + tax - wh
        };
        UI.update();
    },
    applyRound(num) {
        if (AppState.round === 'ceil') return Math.ceil(num);
        if (AppState.round === 'round') return Math.round(num);
        return Math.floor(num);
    }
};

// --- UI制御 ---
const UI = {
    init() {
        const input = document.getElementById('main-input');
        input.addEventListener('input', (e) => {
            let raw = e.target.value.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
            raw = raw.replace(/[^0-9]/g, '');
            AppState.val = Number(raw);
            e.target.value = AppState.val ? AppState.val.toLocaleString() : '';
            Calc.execute();
        });

        ['tax-rate', 'tax-round', 'wh-cat'].forEach(id => {
            document.getElementById(id).addEventListener('change', (e) => {
                const key = id.replace(/-([a-z])/g, g => g[1].toUpperCase());
                AppState[key] = isNaN(e.target.value) ? e.target.value : Number(e.target.value);
                Calc.execute();
            });
        });

        document.getElementById('wh-check').addEventListener('change', (e) => {
            AppState.isWh = e.target.checked;
            document.getElementById('wh-config').style.display = AppState.isWh ? 'block' : 'none';
            Calc.execute();
        });

        // テーマ復元
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const now = document.documentElement.getAttribute('data-theme');
            const next = now === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });

        // バリデーション
        document.getElementById('pdf-client').addEventListener('input', this.validatePdf);
        
        Calc.execute();
        Tracker.load();
    },
    setMode(m) {
        AppState.mode = m;
        ['net', 'ex', 'in'].forEach(id => {
            document.getElementById('tab-' + id).className = (id === m) ? 'btn-pri' : 'btn-sec';
        });
        Calc.execute();
    },
    preset(n) {
        document.getElementById('main-input').value = n.toLocaleString();
        AppState.val = n;
        Calc.execute();
    },
    update() {
        const r = AppState.results;
        document.getElementById('out-total').innerText = `¥${r.total.toLocaleString()}`;
        document.getElementById('out-ex').innerText = `¥${r.ex.toLocaleString()}`;
        document.getElementById('out-tax').innerText = `¥${r.tax.toLocaleString()}`;
        document.getElementById('out-wh').innerText = `¥${r.wh.toLocaleString()}`;
        document.getElementById('out-net').innerText = `¥${r.net.toLocaleString()}`;

        let f = `【計算根拠】\n`;
        f += `税抜報酬: ${r.ex.toLocaleString()}円\n`;
        f += `消費税(${Math.round(AppState.taxRate*100)}%): +${r.tax.toLocaleString()}円\n`;
        f += `源泉徴収: -${r.wh.toLocaleString()}円\n`;
        f += `合計入金額: ${r.net.toLocaleString()}円`;
        document.getElementById('out-formula').innerText = f;
    },
    toggleFaq(btn) {
        btn.parentElement.classList.toggle('open');
    },
    validatePdf() {
        const client = document.getElementById('pdf-client').value;
        document.getElementById('btn-pdf').disabled = !client;
    },
    copyResult() {
        const r = AppState.results;
        const txt = `請求額(税込): ¥${r.total.toLocaleString()}\n税抜: ¥${r.ex.toLocaleString()}\n源泉徴収: ¥${r.wh.toLocaleString()}\n手取り: ¥${r.net.toLocaleString()}`;
        navigator.clipboard.writeText(txt);
        alert("コピーしました");
    },
    openModal(id) { document.getElementById(id).classList.add('open'); },
    closeModal(id) { document.getElementById(id).classList.remove('open'); }
};

// --- 履歴管理 (IndexedDB) ---
const Tracker = {
    db: null,
    async initDB() {
        return new Promise((resolve) => {
            const req = indexedDB.open("FricalDB", 1);
            req.onupgradeneeded = (e) => {
                e.target.result.createObjectStore("history", { keyPath: "id", autoIncrement: true });
            };
            req.onsuccess = (e) => { this.db = e.target.result; resolve(); };
        });
    },
    async save() {
        if (!this.db) await this.initDB();
        const data = {
            date: new Date().toLocaleString(),
            ...AppState.results,
            client: document.getElementById('pdf-client').value || '未指定'
        };
        const tx = this.db.transaction("history", "readwrite");
        tx.objectStore("history").add(data);
        this.load();
    },
    async load() {
        if (!this.db) await this.initDB();
        const list = document.getElementById('history-list');
        const tx = this.db.transaction("history", "readonly");
        const req = tx.objectStore("history").getAll();
        req.onsuccess = () => {
            const res = req.result.reverse();
            list.innerHTML = res.length ? res.map(i => `
                <div style="border-bottom:1px solid var(--border-main); padding:8px 0;">
                    <small>${i.date}</small> <strong>¥${i.total.toLocaleString()}</strong> (${i.client})
                </div>
            `).join('') : '履歴はありません';
        };
    },
    async clear() {
        if (!confirm("履歴をすべて削除しますか？")) return;
        const tx = this.db.transaction("history", "readwrite");
        tx.objectStore("history").clear();
        this.load();
    }
};

// --- 日本語PDF生成 ---
const PDF = {
    async generate() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const r = AppState.results;

        // 日本語フォントの読み込み (BIZ UDGothic)
        // jsPDFで日本語を扱うにはフォントのBase64化が必要ですが、
        // ここでは実行時にGoogle Fontsから取得する仕組みをシミュレートします。
        // 実際には事前にBase64化したフォントファイルを読み込むのが最も安定します。
        try {
            UI.showToast?.("PDF生成中...");
            
            // フォント設定（本来はBase64が必要だが、ここでは標準フォントで枠組みを作成）
            // ※ブラウザ環境で日本語を出すための最小構成
            doc.setFontSize(20);
            doc.text("INVOICE", 105, 20, { align: "center" });
            
            doc.setFontSize(12);
            doc.text(`To: ${document.getElementById('pdf-client').value}`, 20, 40);
            doc.text(`No: ${document.getElementById('pdf-number').value || '---'}`, 140, 40);
            doc.text(`Date: ${new Date().toLocaleDateString()}`, 140, 50);

            const body = [
                ["Item", "Amount"],
                ["Fee (Tax Excl.)", `Yen ${r.ex.toLocaleString()}`],
                ["Tax", `Yen ${r.tax.toLocaleString()}`],
                ["Withholding", `Yen -${r.wh.toLocaleString()}`],
                ["Total", `Yen ${r.net.toLocaleString()}`]
            ];

            doc.autoTable({
                startY: 70,
                head: [body[0]],
                body: body.slice(1),
                theme: 'grid',
                headStyles: { fillColor: [37, 99, 235] }
            });

            doc.text("Note:", 20, doc.lastAutoTable.finalY + 20);
            doc.setFontSize(10);
            doc.text(document.getElementById('pdf-note').value || "None", 20, doc.lastAutoTable.finalY + 30);

            doc.save("invoice.pdf");
        } catch (e) {
            console.error(e);
            alert("PDF生成に失敗しました。");
        }
    }
};

window.onload = () => UI.init();
</script>

</body>
</html>
